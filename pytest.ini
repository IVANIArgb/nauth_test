[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short --junitxml=tests/reports/junit.xml
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Отчёты сохраняются в папке tests/reports (при запуске с --cov)
# Пример: pytest tests/ --cov=backend --cov=database --cov=auth
# HTML-отчёт покрытия: tests/reports/coverage/
# JUnit XML: tests/reports/junit.xml
